# Step definitions for fm-bridge
# Single source of truth for step names, shapes, and block behavior.
# `en` = canonical English name used in .fmscript text and XML output.
# `es` = Spanish name FileMaker emits in Spanish locale (for ES→EN translation).
# `id` = FileMaker global step type ID. REQUIRED for write to work. Discover via `dump-ids`.
# `shape` = how the step's data is serialized in XML. "plain" = no parameters.

