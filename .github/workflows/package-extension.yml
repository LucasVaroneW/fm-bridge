name: Package extension

# Builds the fm-bridge binary for every supported platform, bundles them all
# into a single universal .vsix (the extension picks the right one at runtime),
# and attaches it to the GitHub Release on a `v*` tag. Also runnable on demand.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # One binary per platform, uploaded as an artifact named bin-<platform>-<arch>.
  binaries:
    name: build ${{ matrix.dest }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            dest: darwin-arm64
            exe: fm-bridge
          - os: macos-latest
            target: x86_64-apple-darwin
            dest: darwin-x64
            exe: fm-bridge
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            dest: win32-x64
            exe: fm-bridge.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            dest: linux-x64
            exe: fm-bridge
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.exe }}" "staging/${{ matrix.exe }}"
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.dest }}
          path: staging/${{ matrix.exe }}

  # Assemble every binary into editors/vscode/bin/ and package one .vsix.
  package:
    name: package vsix
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: artifacts
      - name: Assemble bin/
        shell: bash
        run: |
          cd editors/vscode
          mkdir -p bin
          for d in ../../artifacts/bin-*; do
            dest="$(basename "$d")"          # bin-darwin-arm64
            dest="${dest#bin-}"              # darwin-arm64
            mkdir -p "bin/$dest"
            cp "$d"/* "bin/$dest/"
            chmod +x "bin/$dest/"* || true   # artifacts drop the +x bit
          done
          ls -R bin
      - name: Build & package
        working-directory: editors/vscode
        run: |
          npm ci
          npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: fm-bridge-vsix
          path: editors/vscode/*.vsix
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: editors/vscode/*.vsix
